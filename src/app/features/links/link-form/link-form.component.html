<div class="container py-4" style="max-width:600px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a routerLink="/links" class="btn btn-outline-secondary btn-sm">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h4 class="mb-0">{{ isEdit ? 'Edit link' : 'Add new link' }}</h4>
  </div>

  @if (loading()) {
    <div class="spinner-center"><div class="spinner-border text-secondary"></div></div>
  } @else {
    @if (errorMsg()) {
      <div class="alert alert-danger py-2 small">{{ errorMsg() }}</div>
    }

    <div class="card">
      <div class="card-body p-4">
        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="form-label">URL <span class="text-danger">*</span></label>
            <input type="url" class="form-control" formControlName="url" placeholder="https://..."
                   [class.is-invalid]="form.get('url')?.invalid && form.get('url')?.touched">
            <div class="invalid-feedback">Enter a valid URL starting with http(s)://</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" formControlName="title"
                   [class.is-invalid]="form.get('title')?.invalid && form.get('title')?.touched">
            <div class="invalid-feedback">Title is required.</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" formControlName="description" rows="2"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Category <span class="text-danger">*</span></label>
            <input type="text" class="form-control" formControlName="category"
                   placeholder="e.g. Development, Design…"
                   [class.is-invalid]="form.get('category')?.invalid && form.get('category')?.touched">
            <div class="invalid-feedback">Category is required.</div>
          </div>

          <div class="mb-4">
            <label class="form-label">Tags <span class="text-muted small">(comma-separated)</span></label>
            <input type="text" class="form-control" formControlName="tags" placeholder="angular, tutorial">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark" [disabled]="saving()">
              @if (saving()) { <span class="spinner-border spinner-border-sm me-2"></span> }
              {{ isEdit ? 'Save changes' : 'Add link' }}
            </button>
            <a routerLink="/links" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  }
</div>
